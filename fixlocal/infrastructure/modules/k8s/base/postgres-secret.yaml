# Do not commit real values.
# Populate DATABASE_URL via CI/CD pipeline using terraform output postgres_fqdn.
# Format: postgresql://<user>:<password>@<fqdn>:5432/fixlocal?sslmode=require
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
type: Opaque
stringData:
  url: "REPLACE_IN_PIPELINE"
